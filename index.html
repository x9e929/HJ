// 解析单词：按Lesson分组
function parseLessons(text) {
    const lessons = [];
    let currentLesson = null;
    const lines = text.split(/\r?\n/);
    // 辅助：从一行中提取单词和释义 (单词 释义)
    function extractWordMeaning(line) {
        // 匹配格式：单词 空格 释义（中文字符或分号）
        const match = line.match(/^([a-zA-Z\-\(\)]+)\s+([\u4e00-\u9fa5;；，、\s]+)$/);
        if (match) {
            return { word: match[1].trim().toLowerCase(), meaning: match[2].trim().replace(/\s+/g, ' ') };
        }
        // 也可能是 "单词 释义 单词 释义" 连续的情况，但这里逐行处理，已经由行分割处理大部分
        return null;
    }
    for (let line of lines) {
        line = line.trim();
        if (!line) continue;
        // 检测 Lesson 标题
        const lessonMatch = line.match(/====Lesson\s*(\d+)\s*单词\+释义====/i);
        if (lessonMatch) {
            if (currentLesson) lessons.push(currentLesson);
            const lessonNum = parseInt(lessonMatch[1]);
            currentLesson = { lesson: lessonNum, words: [] };
            continue;
        }
        if (currentLesson) {
            // 处理可能多个单词在一行的情况（如 "blank 空白的 obvious 明显的"）
            // 按两个及以上空格分割
            let parts = line.split(/\s{2,}/);
            for (let part of parts) {
                let wm = extractWordMeaning(part);
                if (wm) {
                    currentLesson.words.push(wm);
                } else {
                    // 尝试更宽松的匹配：单词后跟中文，无空格或一个空格
                    let laxMatch = part.match(/^([a-zA-Z\-\(\)]+)[\s]*([\u4e00-\u9fa5;；，、]+)/);
                    if (laxMatch) {
                        currentLesson.words.push({ word: laxMatch[1].trim().toLowerCase(), meaning: laxMatch[2].trim() });
                    }
                }
            }
        }
    }
    if (currentLesson) lessons.push(currentLesson);
    return lessons;
}

function showNormalMode() {
    document.getElementById('meaningPlaceholder').style.display = meaningVisible ? 'none' : 'block';
    document.getElementById('meaningReal').style.display = meaningVisible ? 'block' : 'none';
    document.getElementById('spellModeArea').style.display = 'none';
    document.getElementById('revealBtn').disabled = false;
}
function toggleSpellMode() {
    spellMode = !spellMode;
    if(spellMode) hideMeaningAndShowSpell();
    else showNormalMode();
    document.getElementById('modeSwitchBtn').innerHTML = spellMode ? '<i class="fas fa-eye"></i> 闪卡模式' : '<i class="fas fa-exchange-alt"></i> 拼写模式';
}
function checkSpell() {
    if(!allWords[currentIndex]) return;
    let user = document.getElementById('spellInput').value.trim().toLowerCase();
    let correct = allWords[currentIndex].word.toLowerCase();
    if(user === correct) {
        document.getElementById('spellFeedback').innerHTML = '<span style="color:green;">✅ 完全正确！已从错题本移除（如有）</span>';
        removeFromWrongList(correct);
        let cur = mastery[correct] || 1;
        if(cur < 5) setMastery(cur+1);
    } else {
        document.getElementById('spellFeedback').innerHTML = `<span style="color:#e53e3e;">❌ 错误！正确答案: ${correct}，已加入错题本</span>`;
        addToWrongList(correct);
        let cur = mastery[correct] || 1;
        if(cur > 1) setMastery(cur-1);
    }
}
function revealAnswer() { if(allWords[currentIndex]) document.getElementById('spellFeedback').innerHTML = `🔎 正确答案: ${allWords[currentIndex].word}`; }

// 发音
function speak(lang) { if(!allWords[currentIndex]) return; let utterance = new SpeechSynthesisUtterance(allWords[currentIndex].word); utterance.lang = lang; speechSynthesis.cancel(); speechSynthesis.speak(utterance); }

// 发音准确度
let recognition;
function initRecognition() { if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert("不支持语音识别"); return null; } const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; let rec = new SpeechRecognition(); rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 1; return rec; }
function pronounceAccuracy() { if(!recognition) recognition = initRecognition(); if(!recognition) return; recognition.start(); recognition.onresult = (event) => { let spoken = event.results[0][0].transcript.toLowerCase().trim(); let target = allWords[currentIndex]?.word.toLowerCase() || ''; if(spoken === target) alert(`🎉 完美！`); else if(spoken.includes(target) || target.includes(spoken)) alert(`👍 接近正确！ (你说: ${spoken})`); else alert(`❌ 发音有误，正确: ${target} (你说: ${spoken})`); }; recognition.onerror = () => alert("请检查麦克风权限"); }

// UI更新
function updateWordUI() {
    if(!allWords.length) return;
    const w = allWords[currentIndex];
    document.getElementById('currentWord').innerHTML = w.word;
    document.getElementById('currentPhonetic').innerHTML = `/haɪ friːkwənsi/`; // 简单占位
    document.getElementById('counterText').innerHTML = `第${currentIndex+1} / ${allWords.length}词 | Lesson ${w.lesson}`;
    if(!spellMode){
        if(meaningVisible){
            document.getElementById('chineseDef').innerHTML = w.meaning;
            document.getElementById('exampleSent').innerHTML = w.example;
            document.getElementById('meaningPlaceholder').style.display = 'none';
            document.getElementById('meaningReal').style.display = 'block';
        } else {
            document.getElementById('meaningPlaceholder').style.display = 'block';
            document.getElementById('meaningReal').style.display = 'none';
        }
    } else {
        hideMeaningAndShowSpell();
    }
    updateMasteryStars();
    // 自动英式发音
    if(autoSpeakEnabled && !spellMode) {
        if(currentSpeakTimer) clearTimeout(currentSpeakTimer);
        currentSpeakTimer = setTimeout(() => { speak('en-GB'); }, 200);
    }
}
function showMeaning() { meaningVisible=true; updateWordUI(); }
function hideMeaning() { meaningVisible=false; updateWordUI(); }
function toggleMeaning() { if(spellMode) return; meaningVisible=!meaningVisible; updateWordUI(); }
function nextWord() { if(allWords.length===0) return; currentIndex = (currentIndex+1)%allWords.length; meaningVisible=false; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); }
function prevWord() { if(allWords.length===0) return; currentIndex = (currentIndex-1+allWords.length)%allWords.length; meaningVisible=false; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); }

// Lesson 下拉选择
const lessonSelect = document.getElementById('lessonSelect');
function populateLessonSelect() {
    let lessons = [...new Set(allWords.map(w => w.lesson))].sort((a,b)=>a-b);
    lessonSelect.innerHTML = '<option value="all">全部单词</option>';
    lessons.forEach(ls => {
        let option = document.createElement('option');
        option.value = ls;
        option.textContent = `Lesson ${ls}`;
        lessonSelect.appendChild(option);
    });
}
function filterByLesson(lesson) {
    if(lesson === 'all') {
        // 维持原 allWords 引用，但不改变 allWords 内容，我们用一个临时列表实现
        // 为了简单，重新设置 allWordsFiltered 但会影响索引？我们直接重建全局 allWords 为原始全部
        // 但原始 allWords 是完整的，不需要过滤，只需要重新设置 currentIndex 和 UI
        // 所以我们保留 allWords 始终为完整列表，但 lessonSelect 只影响显示范围？用户希望只显示该Lesson单词。
        // 修改 allWords 会导致丢失其他数据？我们可以创建一个 filteredWords 变量。
        // 为了代码简单，使用全局 filteredWords 并切换，但会影响学习数据存储（因为存储基于word字符串，不影响）。
        // 实现：
        window.currentDisplayWords = [...allWords];
        currentIndex = 0;
        updateWordUI();
    } else {
        let filtered = allWords.filter(w => w.lesson == lesson);
        window.currentDisplayWords = filtered;
        if(filtered.length === 0) { alert(`Lesson ${lesson} 无单词`); return; }
        currentIndex = 0;
        updateWordUI();
    }
}
// 修改 updateWordUI 使用 window.currentDisplayWords
let originalUpdateWordUI = updateWordUI;
updateWordUI = function() {
    let words = window.currentDisplayWords || allWords;
    if(!words.length) return;
    const w = words[currentIndex];
    document.getElementById('currentWord').innerHTML = w.word;
    document.getElementById('currentPhonetic').innerHTML = `/haɪ friːkwənsi/`;
    document.getElementById('counterText').innerHTML = `第${currentIndex+1} / ${words.length}词 | Lesson ${w.lesson}`;
    if(!spellMode){
        if(meaningVisible){
            document.getElementById('chineseDef').innerHTML = w.meaning;
            document.getElementById('exampleSent').innerHTML = w.example;
            document.getElementById('meaningPlaceholder').style.display = 'none';
            document.getElementById('meaningReal').style.display = 'block';
        } else {
            document.getElementById('meaningPlaceholder').style.display = 'block';
            document.getElementById('meaningReal').style.display = 'none';
        }
    } else {
        hideMeaningAndShowSpell();
    }
    updateMasteryStars();
    if(autoSpeakEnabled && !spellMode) {
        if(currentSpeakTimer) clearTimeout(currentSpeakTimer);
        currentSpeakTimer = setTimeout(() => { speak('en-GB'); }, 200);
    }
};
function nextWord() { let words = window.currentDisplayWords || allWords; if(words.length===0) return; currentIndex = (currentIndex+1)%words.length; meaningVisible=false; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); }
function prevWord() { let words = window.currentDisplayWords || allWords; if(words.length===0) return; currentIndex = (currentIndex-1+words.length)%words.length; meaningVisible=false; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); }
// 搜索也适配当前显示列表
function performSearch() {
    let keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!keyword) { alert("请输入单词"); return; }
    let words = window.currentDisplayWords || allWords;
    let idx = words.findIndex(w => w.word === keyword);
    if(idx !== -1) { currentIndex = idx; meaningVisible=false; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); }
    else { alert(`未找到单词“${keyword}”`); }
}

lessonSelect.addEventListener('change', (e) => { filterByLesson(e.target.value); });
window.currentDisplayWords = [...allWords];
populateLessonSelect();

// 搜索按钮
document.getElementById('searchBtn').addEventListener('click', performSearch);
document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });

// 绑定其余事件
document.getElementById('revealBtn').addEventListener('click', toggleMeaning);
document.getElementById('speakUkBtn').addEventListener('click', ()=>speak('en-GB'));
document.getElementById('speakUsBtn').addEventListener('click', ()=>speak('en-US'));
document.getElementById('prevBtn').addEventListener('click', prevWord);
document.getElementById('nextBtn').addEventListener('click', nextWord);
document.getElementById('darkModeBtn').addEventListener('click', toggleDark);
document.getElementById('modeSwitchBtn').addEventListener('click', toggleSpellMode);
document.getElementById('checkSpellBtn').addEventListener('click', checkSpell);
document.getElementById('revealAnswerBtn').addEventListener('click', revealAnswer);
document.getElementById('pronounceAccuracyBtn').addEventListener('click', pronounceAccuracy);
document.getElementById('reviewWrongBtn').addEventListener('click', () => { if(wrongList.length) { let w = wrongList[0]; let words = window.currentDisplayWords || allWords; let idx = words.findIndex(item=>item.word===w); if(idx!==-1) { currentIndex=idx; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); else hideMeaning(); } } });
document.getElementById('autoSpeakCheckbox').addEventListener('change', (e) => { autoSpeakEnabled = e.target.checked; });

// 深色模式
function toggleDark(){ document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }
if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
let fontRange = document.getElementById('fontRange');
fontRange.addEventListener('input', (e)=>{ let size = e.target.value; document.querySelector('.en-word').style.fontSize = `${size*2.2}rem`; });

// 手势翻页
let touchStartX = 0;
document.querySelector('.master-card').addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
document.querySelector('.master-card').addEventListener('touchend', (e) => { let endX = e.changedTouches[0].screenX; if(endX - touchStartX > 50) prevWord(); else if(touchStartX - endX > 50) nextWord(); });

// 键盘
window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowLeft'){ prevWord(); e.preventDefault(); }
    else if(e.key === 'ArrowRight'){ nextWord(); e.preventDefault(); }
    else if(e.key === ' ' && !spellMode){ toggleMeaning(); e.preventDefault(); }
});

// 初始化
updateWordUI();
updateWrongListUI();
updateChart();

// PWA 简单注册
if ('serviceWorker' in navigator) {
    const swCode = `const CACHE='pdf-lesson-v1'; self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./','./index.html','https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css'])))); self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    const blob = new Blob([swCode], {type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
